name: Atualizar SINAPI Mensalmente

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install pandas requests beautifulsoup4 openpyxl
    
    - name: Run SINAPI update for all UFs
      run: python scripts/baixar_todas_ufs.py
    
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Atualização automática SINAPI - $(date +'%Y-%m')"
        git push
